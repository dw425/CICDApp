command:
  - gunicorn
  - app:server
  - --bind
  - 0.0.0.0:8050
  - --workers
  - "2"
  - --timeout
  - "120"
  - --graceful-timeout
  - "30"
env:
  - name: CICD_APP_USE_MOCK
    value: "false"
  - name: AUTH_MODE
    value: "databricks"
  - name: CICD_APP_CATALOG
    value: "lho_ucm"
  - name: CICD_APP_SCHEMA
    value: "cicd"
  - name: APP_DEBUG
    value: "false"
